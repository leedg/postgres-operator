name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (golangci + .custom-gcl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify lint config
        run: make lint-config
      - name: Run linter
        run: make lint

  test:
    name: Unit + envtest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go mod tidy (drift check)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Run tests
        run: make test
      - name: Upload coverage
        if: hashFiles('cover.out') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./cover.out
          fail_ci_if_error: false

  matrix-build:
    name: PG ${{ matrix.pg }} x Citus ${{ matrix.citus }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pg: '16', citus: '12.1' }
          - { pg: '16', citus: '13.0' }
          - { pg: '17', citus: '13.0' }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build PG image
        env:
          PG: ${{ matrix.pg }}
          CITUS: ${{ matrix.citus }}
        run: |
          docker buildx build \
            --build-arg PG_MAJOR="$PG" \
            --build-arg CITUS_VERSION="$CITUS" \
            -f "build/images/pg/${PG}/Dockerfile" \
            -t "test-pg:${PG}-citus${CITUS}" \
            --load .

  e2e:
    # Pillar 라벨 — roadmap.md의 14 Pillar 단위로 e2e 통과율을 추적한다.
    # 현재는 P1(Core Lifecycle)만 활성. 다른 Pillar는 해당 마일스톤(P2-M1 등)
    # 도달 시 matrix.pillar에 추가한다.
    name: e2e (kind, PG ${{ matrix.pg }}, ${{ matrix.pillar }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        pg: ['16', '17']
        pillar: ['p1']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: helm/kind-action@v1
        with:
          version: v0.24.0
      - name: go mod tidy
        run: go mod tidy
      - name: Run e2e
        env:
          # matrix.pg와 matrix.pillar는 본 workflow 정의에서만 채워지며 외부
          # 입력(issue/PR title 등)에서 오지 않는다. 따라서 명령행 주입 위험 없음.
          PG_MAJOR: ${{ matrix.pg }}
          PILLAR: ${{ matrix.pillar }}
        run: make test-e2e PILLAR="$PILLAR"

  scan:
    name: Security scan (trivy fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
