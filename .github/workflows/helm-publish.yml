name: Helm chart publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag ref to publish (must already exist, e.g. v1.4.21)"
        required: true

permissions:
  contents: read   # least-privilege at top level; write scoped per job

concurrency:
  group: helm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push to gh-pages + create per-chart Release
      pages: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Chart.yaml ↔ tag parity check
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          CHART_VER=$(grep '^version:' charts/postgres-operator/Chart.yaml | awk '{print $2}' | tr -d '"')
          if [ "$CHART_VER" != "$VERSION" ]; then
            echo "::error::Chart.yaml version ($CHART_VER) does not match tag ($VERSION)"; exit 1
          fi
          echo "✓ chart version aligned with tag ($VERSION)"

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: latest

      - name: Configure git for chart-releaser
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: charts
          # chart-releaser publishes to ./_releases by default; gh-pages branch
          # is updated via pages_branch input default.
          pages_branch: gh-pages
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
