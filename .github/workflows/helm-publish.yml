name: Helm chart publish

# Chart 릴리스 시 두 곳에 동시 publish:
#   1. gh-pages   → HTTP helm repo (https://keiailab.github.io/postgres-operator)
#   2. ghcr.io OCI → oci://ghcr.io/keiailab/charts/postgres-operator  ← ArtifactHub 추적 소스
#
# 트리거 3종 — 어느 릴리스 방식이든 작동:
#   - release: published   → `gh release create vX.Y.Z` (GitHub UI/API/CLI)
#   - push:    tags ['v*'] → `git push origin vX.Y.Z`
#   - workflow_dispatch    → 수동 재실행 / 백필
on:
  release:
    types: [published]
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag ref to publish (must already exist, e.g. v1.10.3)"
        required: true

permissions:
  contents: write   # push to gh-pages + create per-chart Release
  packages: write   # push helm chart to ghcr.io OCI registry
  pages: read

concurrency:
  group: helm-publish-${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}

      - name: Chart.yaml ↔ tag parity check
        env:
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          CHART_VER=$(grep '^version:' charts/postgres-operator/Chart.yaml | awk '{print $2}' | tr -d '"')
          if [ "$CHART_VER" != "$VERSION" ]; then
            echo "::error::Chart.yaml version ($CHART_VER) does not match tag ($VERSION)"; exit 1
          fi
          echo "✓ chart version aligned with tag ($VERSION)"

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: latest

      - name: Configure git for chart-releaser
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # 1) gh-pages HTTP helm repo publish
      #    이미 존재하는 버전(재실행/백필)은 skip 하여 멱등 보장
      - uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: charts
          # chart-releaser publishes to ./_releases by default; gh-pages branch
          # is updated via pages_branch input default.
          pages_branch: gh-pages
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_SKIP_EXISTING: "true"

      # 2) ghcr.io OCI helm chart publish — ArtifactHub 가 추적하는 소스
      #    이 단계 부재가 ArtifactHub stale (1.10.2 정체) 의 근본 원인이었음.
      - name: Push chart to ghcr.io OCI registry
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HELM_GPG_FINGERPRINT: F1A6893583E632A757FF6767F3CC8C6AEC9CEB08
          HELM_SIGNING_PRIVATE_KEY: ${{ secrets.HELM_SIGNING_PRIVATE_KEY }}
          HELM_SIGNING_PASSPHRASE: ${{ secrets.HELM_SIGNING_PASSPHRASE }}
          WORKFLOW_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' charts/postgres-operator/Chart.yaml | awk '{print $2}' | tr -d '"')
          APP_VERSION=$(grep '^appVersion:' charts/postgres-operator/Chart.yaml | awk '{print $2}' | tr -d '"')
          CHART_REF="oci://ghcr.io/keiailab/charts/postgres-operator"
          if [ -z "${HELM_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::HELM_SIGNING_PRIVATE_KEY secret is required so Artifact Hub marks OCI charts as signed"
            exit 1
          fi
          echo "$GHCR_TOKEN" | helm registry login ghcr.io -u "$GHCR_USER" --password-stdin
          cleanup() {
            helm registry logout ghcr.io || true
            rm -rf "${SIGNING_GNUPGHOME:-}" out
          }
          trap cleanup EXIT
          if helm show chart "$CHART_REF" --version "$VERSION" > /tmp/existing-chart.yaml 2>/tmp/existing-chart.err; then
            EXISTING_VERSION=$(awk -F': *' '/^version:/ {gsub(/"/, "", $2); print $2; exit}' /tmp/existing-chart.yaml)
            EXISTING_APP_VERSION=$(awk -F': *' '/^appVersion:/ {gsub(/"/, "", $2); print $2; exit}' /tmp/existing-chart.yaml)
            if [ "$EXISTING_VERSION" != "$VERSION" ] || [ "$EXISTING_APP_VERSION" != "$APP_VERSION" ]; then
              echo "::error::OCI chart ${VERSION} exists with unexpected metadata: version=${EXISTING_VERSION}, appVersion=${EXISTING_APP_VERSION}"
              exit 1
            fi
            if [ "$WORKFLOW_EVENT_NAME" != "workflow_dispatch" ]; then
              echo "✓ OCI chart ${VERSION} already exists with appVersion ${APP_VERSION}; skipping duplicate ${WORKFLOW_EVENT_NAME} publish"
              exit 0
            fi
            echo "↻ OCI chart ${VERSION} already exists; workflow_dispatch will republish signed provenance"
          fi
          SIGNING_GNUPGHOME="$(mktemp -d)"
          chmod 700 "$SIGNING_GNUPGHOME"
          printf '%s\n' "$HELM_SIGNING_PRIVATE_KEY" > "$SIGNING_GNUPGHOME/private.asc"
          gpg --batch --homedir "$SIGNING_GNUPGHOME" --import "$SIGNING_GNUPGHOME/private.asc" >/dev/null
          KEY_LISTING="$(gpg --batch --homedir "$SIGNING_GNUPGHOME" --with-colons --list-secret-keys --fingerprint "$HELM_GPG_FINGERPRINT")"
          FOUND_FINGERPRINT="$(awk -F: '$1 == "fpr" { print $10; exit }' <<< "$KEY_LISTING")"
          SIGNING_KEY_UID="$(awk -F: '$1 == "uid" { print $10; exit }' <<< "$KEY_LISTING")"
          if [ "$FOUND_FINGERPRINT" != "$HELM_GPG_FINGERPRINT" ] || [ -z "$SIGNING_KEY_UID" ]; then
            echo "::error::Helm signing key fingerprint mismatch or missing UID"
            exit 1
          fi
          gpg --batch --homedir "$SIGNING_GNUPGHOME" --yes --export-secret-keys "$HELM_GPG_FINGERPRINT" > "$SIGNING_GNUPGHOME/secring.gpg"
          gpg --batch --homedir "$SIGNING_GNUPGHOME" --yes --export "$HELM_GPG_FINGERPRINT" > "$SIGNING_GNUPGHOME/pubring.gpg"
          chmod 600 "$SIGNING_GNUPGHOME/secring.gpg" "$SIGNING_GNUPGHOME/pubring.gpg"
          SIGN_ARGS=(--sign --key "$SIGNING_KEY_UID" --keyring "$SIGNING_GNUPGHOME/secring.gpg")
          if [ -n "${HELM_SIGNING_PASSPHRASE:-}" ]; then
            printf '%s' "$HELM_SIGNING_PASSPHRASE" > "$SIGNING_GNUPGHOME/passphrase.txt"
            SIGN_ARGS+=(--passphrase-file "$SIGNING_GNUPGHOME/passphrase.txt")
          fi
          mkdir -p out
          helm package "${SIGN_ARGS[@]}" charts/postgres-operator -d out/
          helm verify "out/postgres-operator-${VERSION}.tgz" --keyring "$SIGNING_GNUPGHOME/pubring.gpg"
          test -s "out/postgres-operator-${VERSION}.tgz.prov"
          helm push "out/postgres-operator-${VERSION}.tgz" oci://ghcr.io/keiailab/charts
          helm show chart "$CHART_REF" --version "$VERSION" >/dev/null
          echo "✓ pushed signed chart ${VERSION} to oci://ghcr.io/keiailab/charts/postgres-operator"
