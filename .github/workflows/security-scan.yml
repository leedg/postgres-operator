name: Security scan

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch: {}
  # Run on every PR — security scans must never be skipped just because
  # the diff did not touch go.mod / Dockerfile (ADR-0045/0046). The
  # required_status_checks on `main` depend on these jobs reporting
  # consistently; a paths filter caused checks to remain pending and
  # block legitimate PRs from merging.
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read   # security-events:write scoped per job (trivy SARIF upload)

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          check-latest: true
      # Install + run binary directly instead of golang/govulncheck-action@v1.
      # The action performs internal `git` operations that hit HTTP 400 on
      # dependabot-triggered PRs (read-only token), failing #146 etc.
      # Binary mode is hermetic and dependabot-context safe.
      - name: Install govulncheck
        # Pinned to a specific minor for Scorecard `Pinned-Dependencies`.
        # Bump deliberately as new govulncheck DB releases land.
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Run govulncheck
        run: govulncheck ./...

  trivy-fs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to code-scanning
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif

  trivy-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to code-scanning
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build image (no push)
        run: docker build -t postgres-operator:scan .
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: postgres-operator:scan
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: always()
        with:
          sarif_file: trivy-image.sarif
