# lefthook.yml — pre-commit / pre-push 훅 (P0 §1.1).
#
# 설치: lefthook install
# 우회 (자동화 루프 한정): LEFTHOOK=0 환경변수 또는 commit msg 트레일러 [skip-hooks]
#
# 본 설정은 standards/enforcement.md §1.1 의 lefthook 표준을 따른다.

pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: gofmt -l -w {staged_files}
      stage_fixed: true
    govet:
      glob: "*.go"
      run: go vet ./...
    golangci-lint:
      glob: "*.go"
      # 여러 디렉터리에 걸친 staged files 를 하나의 인자로 넘기면 golangci-lint
      # 가 "named files must all be in one directory" 로 실패. 따라서 전체
      # 패키지 단위로 수행 (--new-from-rev 가 신규 issue 만 출력).
      run: ./bin/golangci-lint run --new-from-rev=HEAD~1 ./...
      skip:
        - merge
        - rebase
    helm-lint:
      glob: "charts/**/*.yaml"
      # chart 변경 시 helm lint 강제 — RFC 0002 L1.
      run: command -v helm >/dev/null 2>&1 && helm lint charts/postgres-operator || echo "helm not installed, skipping"
    adr-phantom-check:
      # standards/adr.md §9.5 — HANDOFF.md staged 시 ADR-XXXX reference 의
      # 실 file 존재 검증 (docs/kb/adr/ + docs/adr/ 양 path union).
      # governance-report `adr_phantom_count` (layer 4) 연동.
      # cycle 25 P10 root cause fix (양 path 인정).
      glob: "docs/internal/HANDOFF.md"
      run: |
        if ! echo "{staged_files}" | grep -qE '(^|/)HANDOFF\.md$'; then exit 0; fi
        refs=$(grep -oE 'ADR-[0-9]{4}' docs/internal/HANDOFF.md 2>/dev/null | sort -u || true)
        if [ -z "$refs" ]; then exit 0; fi
        missing=""
        for ref in $refs; do
          num=$(echo "$ref" | sed 's/ADR-//')
          # bash glob 결과를 ls + head 로 검사 (양 path union).
          if ! ls docs/kb/adr/${num}-*.md 2>/dev/null | grep -q . && ! ls docs/adr/${num}-*.md 2>/dev/null | grep -q .; then
            missing="$missing $ref"
          fi
        done
        if [ -n "$missing" ]; then
          echo "❌ phantom ADR reference 발견 (HANDOFF.md staged + 해당 ADR file 부재):"
          echo " $missing"
          echo "fix: 해당 ADR file 작성 (docs/kb/adr/) 또는 reference 정정"
          exit 1
        fi
    orphan-plan-files-block:
      # standards/workflow.md §2 종료 의식 + enforcement.md §3.1.2.
      # repo 루트의 임시 plan/scratch file commit 차단.
      # exemption: HANDOFF/TASKS/ROADMAP/README/CHANGELOG/CLAUDE/AGENTS (legitimate).
      # 우회: ORPHAN_OK=1 git commit ...
      run: |
        if [ "${ORPHAN_OK:-0}" = "1" ]; then exit 0; fi
        orphans=$(ls PLAN.md TODO.md TODO_*.md SCRATCH.md SCRATCH_*.md tmp_*.md scratch_*.md draft_*.md NOTES.md 2>/dev/null || true)
        if [ -n "$orphans" ]; then
          echo "❌ orphan plan/scratch file 발견 (repo root):"
          echo "$orphans"
          echo "(legitimate: HANDOFF.md / TASKS.md / ROADMAP.md / README.md / CHANGELOG.md / CLAUDE.md / AGENTS.md)"
          echo "우회: ORPHAN_OK=1 git commit ..."
          exit 1
        fi
    gha-block:
      # RFC-0002 §2 (2026-04-29): GitHub Actions 영구 금지 — `.github/workflows/`
      # 디렉토리 *신규 파일 추가* 금지. modify 는 허용 (dependabot 의 actions 버전
      # bump 등) — ADR-0019 v2.0 dual-track 운영 정합.
      # commons ADR-0012 (gha-block hook 자동 강제) 패턴.
      # 본 ADR: ADR-0021 (RFC-0002 GHA block hook).
      # 우회: PLAN_BYPASS=1 git commit (PR 본문 사유 + ADR 인용 의무)
      run: |
        if [ "${PLAN_BYPASS:-0}" = "1" ]; then exit 0; fi
        added=$(git diff --cached --name-only --diff-filter=A | grep "^\.github/workflows/" || true)
        if [ -n "$added" ]; then
          echo "❌ RFC-0002 §2 위반: .github/workflows/ 신규 파일 추가 금지 (modify 는 허용 — ADR-0019 v2.0 dual-track)"
          echo "   파일: $added"
          echo "   대체: 로컬 4계층 (lefthook + Makefile + 리뷰어 증거)"
          echo "   예외 (helm-publish/release/scorecard 등) ADR 작성 후 사용자 명시 승인 필요"
          echo "   우회: PLAN_BYPASS=1 git commit ..."
          exit 1
        fi

pre-push:
  parallel: false
  commands:
    unit-test:
      # envtest binary (etcd + kube-apiserver) 가 없으면 자동 다운로드 후
      # KUBEBUILDER_ASSETS 절대 경로 export. 호스트 환경 무관하게 통과.
      # ADR-0024 (Phase 1B-prereq): GHA 폐지 후 로컬 4계층 일관성 확보.
      run: |
        test -d bin/k8s || make setup-envtest >/dev/null 2>&1 || true
        K8S_DIR=$(ls -d bin/k8s/*/ 2>/dev/null | head -1)
        if [ -z "$K8S_DIR" ]; then
          echo "❌ envtest 설정 실패 — 'make setup-envtest' 수동 실행 후 재push"
          exit 1
        fi
        export KUBEBUILDER_ASSETS="$(pwd)/${K8S_DIR%/}"
        go test -count=1 -timeout=120s ./...
    full-lint:
      # PR 신규 이슈만 차단 (기존 main 이슈는 별개 modernize PR 로 처리).
      # base ref: origin/main 우선, 미존재 시 HEAD~1 fallback.
      # ADR-0024: incremental lint = pre-commit 의 --new-from-rev=HEAD~1 패턴
      # 을 pre-push 단계로 확장 (PR 전체 commit 검사).
      run: |
        if git rev-parse --verify origin/main >/dev/null 2>&1; then
          BASE_REF="origin/main"
        else
          BASE_REF="HEAD~1"
        fi
        ./bin/golangci-lint run --new-from-rev="$BASE_REF"
    helm-lint:
      # chart sanity (gh-pages publish 전 마지막 가드).
      run: command -v helm >/dev/null 2>&1 && helm lint charts/postgres-operator || true
    helm-template:
      # default values 로 render OK 인지 — clusterrole.yaml 가드 회귀 차단.
      # 기본 values 로 render 만 검증. 향후 feature flag 도입 시 --set 추가.
      run: |
        command -v helm >/dev/null 2>&1 || exit 0
        helm template postgres-operator charts/postgres-operator >/dev/null
    govulncheck:
      # Go module CVE — call graph 기반 (실제 호출하는 취약 함수만 차단).
      # 설치: go install golang.org/x/vuln/cmd/govulncheck@latest
      run: command -v govulncheck >/dev/null 2>&1 && govulncheck ./... || echo "[warn] govulncheck 미설치 — go install golang.org/x/vuln/cmd/govulncheck@latest 권장"
    gitleaks:
      # 시크릿 누출 차단 — RFC 0002 L2 + standards/enforcement.md §1.5.
      run: command -v gitleaks >/dev/null 2>&1 && gitleaks protect --staged --no-banner || echo "gitleaks not installed (brew install gitleaks)"
    platforms-amd64-guard:
      # C-P0-12 (RFC 0002 §2): PLATFORMS 의 multi-arch 재발 방지. C-P0-1 강등 후속.
      run: |
        if grep -qE "^PLATFORMS.*linux/(arm64|s390x|ppc64le)" Makefile; then
          echo "❌ Multi-arch PLATFORMS 잔존 — RFC 0002 §2 위반 (amd64-only 강제)"
          exit 1
        fi
    version-sync:
      # 5-way version SSOT 정합 (CITATION + Chart version/appVersion + kustomize
      # newTag + dist/install.yaml image tag). standards/enforcement.md §3.1.4
      # (`version-ssot-drift` rule) + standards/checklist.md PR row 정합.
      # 트리거 사고: 2026-05-20 RCA — CITATION.cff `v0.3.0-alpha.15` ↔ Chart
      # `0.4.0-beta.1` 3 release silent drift.
      # 우회: VERSION_SYNC_SKIP=1 환경변수.
      run: bash scripts/check-version-sync.sh
    go-mod-tidy:
      # go.mod direct/indirect drift 차단 (cycle 46 발견). go mod tidy 후 변경
      # 발생하면 push 차단 — 의존성 그래프 정확성 보장 (security audit false
      # negative 방지).
      run: |
        # 임시 백업 → tidy → diff → 복원.
        cp go.mod /tmp/.go.mod.lefthook.bak
        cp go.sum /tmp/.go.sum.lefthook.bak
        go mod tidy
        if ! diff -q go.mod /tmp/.go.mod.lefthook.bak >/dev/null 2>&1 || ! diff -q go.sum /tmp/.go.sum.lefthook.bak >/dev/null 2>&1; then
          # 복원 후 fail.
          cp /tmp/.go.mod.lefthook.bak go.mod
          cp /tmp/.go.sum.lefthook.bak go.sum
          rm -f /tmp/.go.mod.lefthook.bak /tmp/.go.sum.lefthook.bak
          echo "❌ go.mod / go.sum drift — 'go mod tidy' 후 commit 필요"
          exit 1
        fi
        rm -f /tmp/.go.mod.lefthook.bak /tmp/.go.sum.lefthook.bak
    kube-linter:
      # K8s 리소스 보안/best-practice 검사 (구 .github/workflows/kube-linter.yml 대체).
      # dist/install.yaml + helm template 양쪽 검사.
      # 설치: brew install kube-linter (또는 go install golang.stackrox.io/kube-linter/cmd/kube-linter@latest)
      # 우회: KUBE_LINTER_SKIP=1
      run: |
        if [ "${KUBE_LINTER_SKIP:-0}" = "1" ]; then exit 0; fi
        if ! command -v kube-linter >/dev/null 2>&1; then
          echo "[warn] kube-linter 미설치 — brew install kube-linter (또는 KUBE_LINTER_SKIP=1)"
          exit 0
        fi
        if ! command -v helm >/dev/null 2>&1; then
          echo "[warn] helm 미설치 — kube-linter helm template skip"
          exit 0
        fi
        # helm template default values 로 lint (dist/install.yaml 가 stale 일 수 있어 helm 만).
        helm template postgres-operator charts/postgres-operator --include-crds | kube-linter lint -
    go-licenses:
      # Go 의존성 라이선스 검사 (구 .github/workflows/go-licenses.yml 대체).
      # forbidden license (GPL-3.0, AGPL 등) 포함 의존성 차단.
      # 설치: go install github.com/google/go-licenses@latest
      # 우회: GO_LICENSES_SKIP=1
      run: |
        if [ "${GO_LICENSES_SKIP:-0}" = "1" ]; then exit 0; fi
        if ! command -v go-licenses >/dev/null 2>&1; then
          echo "[warn] go-licenses 미설치 — go install github.com/google/go-licenses@latest (또는 GO_LICENSES_SKIP=1)"
          exit 0
        fi
        go-licenses check ./... --disallowed_types=forbidden,restricted 2>&1 | grep -v "^W" || true
    markdown-link-check:
      # 마크다운 문서의 깨진 링크 검사 (구 .github/workflows/markdown-link-check.yml 대체).
      # 설치: npm install -g markdown-link-check
      # 우회: MD_LINK_CHECK_SKIP=1
      # ADR-0024: PR 신규/수정 markdown 만 검사 (full-lint 와 동일 incremental 정책).
      # 기존 main 의 깨진 링크 부채는 별개 PR 로 누적 처리.
      run: |
        if [ "${MD_LINK_CHECK_SKIP:-0}" = "1" ]; then exit 0; fi
        if ! command -v markdown-link-check >/dev/null 2>&1; then
          echo "[warn] markdown-link-check 미설치 — npm install -g markdown-link-check (또는 MD_LINK_CHECK_SKIP=1)"
          exit 0
        fi
        if git rev-parse --verify origin/main >/dev/null 2>&1; then
          BASE_REF="origin/main"
        else
          BASE_REF="HEAD~1"
        fi
        changed_md=$(git diff --name-only "$BASE_REF"...HEAD 2>/dev/null | grep -E '\.md$' || true)
        if [ -z "$changed_md" ]; then
          echo "(no markdown changes vs $BASE_REF — skip)"
          exit 0
        fi
        # ADR-0024 amendment (2026-05-21): .markdownlinkcheck.json config 사용 —
        # 외부 인프라 부재 (keiailab.com /assets 미배포 + GitHub Pages 미배포)
        # 의 dead link 를 ignorePatterns 로 분리. 신규 dead link 는 차단 유지.
        CFG=""
        [ -f .markdownlinkcheck.json ] && CFG="-c .markdownlinkcheck.json"
        fail=0
        for f in $changed_md; do
          [ -f "$f" ] || continue
          markdown-link-check -q $CFG "$f" || fail=1
        done
        [ "$fail" = "0" ] || { echo "❌ 깨진 markdown link 발견 (PR 변경 파일)"; exit 1; }

commit-msg:
  commands:
    conventional:
      # Conventional Commits 패턴 (standards/commits.md §1).
      # 본 환경 (Korean 본문 허용) 에서는 type 만 강제, subject case 자유.
      run: |
        msg=$(head -1 {1})
        if echo "$msg" | grep -qE '^(\[skip-hooks\]|Merge|Revert)' ; then
          exit 0
        fi
        if ! echo "$msg" | grep -qE '^(feat|fix|docs|style|refactor|test|chore|ci|build|perf|revert)(\([^)]+\))?!?: .+' ; then
          echo "Commit message must follow Conventional Commits: <type>(<scope>): <subject>"
          echo "Got: $msg"
          exit 1
        fi
    dco-signoff:
      # A-P0-5: DCO Signed-off-by enforce by default (2026-05-11). DCO_STRICT=0 으로 일시 우회.
      run: |
        if ! grep -qE '^Signed-off-by: .+ <.+@.+>' "{1}"; then
          if [ "${DCO_STRICT:-1}" = "1" ]; then
            echo "❌ DCO Signed-off-by trailer missing — use git commit -s"
            exit 1
          else
            echo "[warn] DCO Signed-off-by trailer missing (set DCO_STRICT=1 to enforce)"
          fi
        fi
