# Local 4-tier gate (RFC 0002 — GH Actions 영구 금지). ADR 0009 참조.
#
# 도입:
#   pre-commit install --hook-type pre-commit --hook-type pre-push
#
# 우회:
#   `--no-verify`는 사고 보고 의무 (incident-kb.md). 남용 금지.
#
# 매핑:
#   L1 pre-commit  — lint (빠른 피드백)
#   L2 pre-push    — test (unit + envtest), audit (trivy fs), secrets (gitleaks),
#                    go.mod drift check
#   L3 Makefile    — e2e (kind), matrix-build (docker buildx) — 수동 실행
#   L4 PR review   — PR body의 "로컬 게이트 PASS" 증거 블록 확인

repos:
  - repo: local
    hooks:
      # ================================================================
      # L1 pre-commit — fast feedback (< 30s 목표)
      # ================================================================
      - id: golangci-lint
        name: golangci-lint (with .custom-gcl)
        language: system
        entry: bash -c 'make lint-config && make lint'
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # ================================================================
      # L2 pre-push — comprehensive verification (1-3 min 목표)
      # ================================================================
      - id: go-mod-tidy-drift
        name: go.mod / go.sum drift check
        language: system
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum'
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: go-test
        name: Unit + envtest (make test)
        language: system
        entry: make test
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: govulncheck
        name: govulncheck (Go module CVE — call graph 기반)
        description: 코드가 실제 호출하는 취약 함수만 차단. 설치 — go install golang.org/x/vuln/cmd/govulncheck@latest
        language: system
        entry: bash -c 'command -v govulncheck >/dev/null 2>&1 && govulncheck ./... || { echo "[warn] govulncheck 미설치 — go install golang.org/x/vuln/cmd/govulncheck@latest 권장"; exit 0; }'
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: trivy-fs-audit
        name: Trivy fs (HIGH+CRITICAL — make audit)
        language: system
        entry: make audit
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: gitleaks
        name: gitleaks (staged secrets scan)
        language: system
        entry: bash -c 'command -v gitleaks >/dev/null 2>&1 && gitleaks protect --staged --redact || { echo "[warn] gitleaks 미설치 — brew install gitleaks 권장"; exit 0; }'
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: platforms-amd64-guard
        name: Multi-arch 재발 방지 (RFC 0002 §2, C-P0-12)
        description: PLATFORMS 가 arm64/s390x/ppc64le 포함 시 push 차단. C-P0-1 후속 가드.
        language: system
        entry: bash -c 'if grep -qE "^PLATFORMS.*linux/(arm64|s390x|ppc64le)" Makefile; then echo "❌ Multi-arch PLATFORMS 잔존 — RFC 0002 §2 위반 (amd64-only 강제)"; exit 1; fi'
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  - repo: local
    hooks:
      - id: dco-signoff
        name: DCO Signed-off-by check (A-P0-5)
        description: Warns if Signed-off-by trailer missing. DCO_STRICT=1 to enforce.
        language: system
        entry: bash -c 'msg_file="$1"; if ! grep -qE "^Signed-off-by: .+ <.+@.+>" "$msg_file"; then if [ "${DCO_STRICT:-0}" = "1" ]; then echo "❌ DCO Signed-off-by trailer missing — use git commit -s"; exit 1; else echo "[warn] DCO Signed-off-by trailer missing (set DCO_STRICT=1 to enforce)"; fi; fi' --
        stages: [commit-msg]
        always_run: true
        pass_filenames: true
