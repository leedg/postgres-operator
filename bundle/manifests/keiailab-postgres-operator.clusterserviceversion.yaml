apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "postgres.keiailab.io/v1alpha1",
          "kind": "BackupJob",
          "metadata": {
            "name": "quickstart-full-backup",
            "namespace": "default"
          },
          "spec": {
            "cluster": {
              "name": "quickstart"
            },
            "executionMode": "job",
            "jobTemplate": {
              "spec": {
                "backoffLimit": 1,
                "template": {
                  "spec": {
                    "containers": [
                      {
                        "args": [
                          "pgbackrest --stanza=\"${POSTGRES_CLUSTER_NAME}\" --repo=\"${BACKUP_REPO}\" backup --type=\"${BACKUP_TYPE}\""
                        ],
                        "command": [
                          "/bin/sh",
                          "-c"
                        ],
                        "image": "ghcr.io/keiailab/pg:18",
                        "name": "pgbackrest"
                      }
                    ],
                    "restartPolicy": "Never"
                  }
                }
              }
            },
            "repo": "repo1",
            "tool": "pgbackrest",
            "type": "full"
          }
        },
        {
          "apiVersion": "postgres.keiailab.io/v1alpha1",
          "kind": "ClusterImageCatalog",
          "metadata": {
            "name": "postgresql-standard"
          },
          "spec": {
            "images": [
              {
                "image": "ghcr.io/keiailab/pg:17",
                "major": 17
              },
              {
                "image": "ghcr.io/keiailab/pg:18",
                "major": 18
              }
            ]
          }
        },
        {
          "apiVersion": "postgres.keiailab.io/v1alpha1",
          "kind": "ImageCatalog",
          "metadata": {
            "name": "postgresql",
            "namespace": "default"
          },
          "spec": {
            "images": [
              {
                "extensions": [
                  {
                    "image": {
                      "reference": "ghcr.io/keiailab/pg-extension-pgaudit:18"
                    },
                    "name": "pgaudit"
                  }
                ],
                "image": "ghcr.io/keiailab/pg:18",
                "major": 18
              }
            ]
          }
        },
        {
          "apiVersion": "postgres.keiailab.io/v1alpha1",
          "kind": "Pooler",
          "metadata": {
            "name": "quickstart-rw-pooler",
            "namespace": "default"
          },
          "spec": {
            "cluster": {
              "name": "quickstart"
            },
            "instances": 2,
            "pgbouncer": {
              "authSecretRef": {
                "name": "quickstart-pooler-auth"
              },
              "image": "ghcr.io/cloudnative-pg/pgbouncer:1.24.1",
              "parameters": {
                "default_pool_size": "20",
                "max_client_conn": "1000"
              },
              "poolMode": "session"
            },
            "type": "rw"
          }
        },
        {
          "apiVersion": "postgres.keiailab.io/v1alpha1",
          "kind": "PostgresCluster",
          "metadata": {
            "name": "quickstart",
            "namespace": "default"
          },
          "spec": {
            "postgresVersion": "18",
            "shardingMode": "none",
            "shards": {
              "initialCount": 1,
              "replicas": 0,
              "storage": {
                "size": "10Gi"
              }
            }
          }
        },
        {
          "apiVersion": "postgres.keiailab.io/v1alpha1",
          "kind": "PostgresDatabase",
          "metadata": {
            "name": "quickstart-appdb"
          },
          "spec": {
            "cluster": {
              "name": "quickstart"
            },
            "databaseReclaimPolicy": "retain",
            "ensure": "present",
            "extensions": [
              {
                "ensure": "present",
                "name": "pgcrypto"
              },
              {
                "ensure": "present",
                "name": "postgres_fdw"
              }
            ],
            "fdws": [
              {
                "name": "postgres_fdw",
                "usage": [
                  {
                    "name": "app",
                    "type": "grant"
                  }
                ]
              }
            ],
            "name": "appdb",
            "owner": "app",
            "privileges": [
              {
                "privileges": [
                  "CONNECT",
                  "TEMPORARY"
                ],
                "role": "app",
                "type": "grant"
              }
            ],
            "schemas": [
              {
                "ensure": "present",
                "name": "app",
                "owner": "app",
                "privileges": [
                  {
                    "privileges": [
                      "USAGE",
                      "CREATE"
                    ],
                    "role": "app",
                    "type": "grant"
                  }
                ]
              }
            ],
            "servers": [
              {
                "fdw": "postgres_fdw",
                "name": "quickstart-rw",
                "options": [
                  {
                    "name": "host",
                    "value": "quickstart-rw"
                  },
                  {
                    "name": "dbname",
                    "value": "appdb"
                  },
                  {
                    "name": "port",
                    "value": "5432"
                  }
                ],
                "usage": [
                  {
                    "name": "app",
                    "type": "grant"
                  }
                ]
              }
            ],
            "tablespace": "fastspace"
          }
        },
        {
          "apiVersion": "postgres.keiailab.io/v1alpha1",
          "kind": "PostgresUser",
          "metadata": {
            "name": "quickstart-app"
          },
          "spec": {
            "bypassrls": false,
            "cluster": {
              "name": "quickstart"
            },
            "connectionLimit": 25,
            "createdb": true,
            "createrole": false,
            "ensure": "present",
            "inRoles": [
              "readonly",
              "writers"
            ],
            "inherit": true,
            "login": true,
            "name": "app",
            "replication": false,
            "validUntil": "infinity"
          }
        },
        {
          "apiVersion": "postgres.keiailab.io/v1alpha1",
          "kind": "ScheduledBackup",
          "metadata": {
            "name": "quickstart-nightly",
            "namespace": "default"
          },
          "spec": {
            "backupOwnerReference": "self",
            "cluster": {
              "name": "quickstart"
            },
            "concurrencyPolicy": "Forbid",
            "immediate": true,
            "repo": "repo1",
            "retention": {
              "full": 7
            },
            "schedule": "0 0 17 * * *",
            "suspend": false,
            "tool": "pgbackrest",
            "type": "full"
          }
        }
      ]
    capabilities: Seamless Upgrades
    categories: Database, Storage
    containerImage: ghcr.io/keiailab/postgres-operator:0.4.0-alpha.1
    createdAt: "2026-05-12T13:53:44Z"
    description: |
      Apache-2.0 PostgreSQL Kubernetes Operator — vanilla PG17/PG18, license-clean,
      production-grade independent implementation without forking, embedding, or
      wrapping any external operator. Supports both PG17 and PG18 major versions.
    operators.operatorframework.io/builder: operator-sdk-v1.42.2
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/keiailab/postgres-operator
    support: https://github.com/keiailab/postgres-operator/issues
  name: keiailab-postgres-operator.v0.4.0-alpha.1
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: BackupJob represents a pgBackRest-based backup/restore Job for a PostgresCluster. executionMode=sidecar sends commands via K8s exec to the ready primary Pod; executionMode=job runs a separate batch/v1 Job runner.
      displayName: Backup Job
      kind: BackupJob
      name: backupjobs.postgres.keiailab.io
      version: v1alpha1
    - description: ClusterImageCatalog is a cluster-scoped PostgreSQL runtime image catalog. Referenced via PostgresCluster.spec.imageCatalogRef.kind=ClusterImageCatalog. Provides a CloudNativePG-compatible API surface.
      displayName: Cluster Image Catalog
      kind: ClusterImageCatalog
      name: clusterimagecatalogs.postgres.keiailab.io
      version: v1alpha1
    - description: ImageCatalog is a namespace-scoped PostgreSQL runtime image catalog. Referenced via PostgresCluster.spec.imageCatalogRef.kind=ImageCatalog to select a major version within the same namespace. CloudNativePG-compatible API surface.
      displayName: Image Catalog
      kind: ImageCatalog
      name: imagecatalogs.postgres.keiailab.io
      version: v1alpha1
    - description: Pooler declares a PgBouncer connection pool layer for a PostgresCluster. spec.type=rw connects to the primary write endpoint; spec.type=ro connects to the replica read endpoint. Manages ConfigMap, Deployment, Service, exporter sidecar, PAUSE/RESUME, and SIGHUP reload.
      displayName: Pooler
      kind: Pooler
      name: poolers.postgres.keiailab.io
      version: v1alpha1
    - description: PostgresCluster is the declarative representation of a K8s-native distributed PostgreSQL cluster (ADR 0001 / RFC 0001). Includes primary + streaming standby topology, native sharding roadmap, replica cluster, image catalog reference, and declarative monitoring surface.
      displayName: Postgres Cluster
      kind: PostgresCluster
      name: postgresclusters.postgres.keiailab.io
      version: v1alpha1
    - description: PostgresDatabase declaratively manages databases, tablespaces, schemas, extensions, FDWs, foreign servers, and their privileges within a PostgresCluster. Applies SQL via psql in the ready primary Pod postgres container and records status.applied/conditions. databaseReclaimPolicy=delete triggers DROP DATABASE on CR deletion.
      displayName: Postgres Database
      kind: PostgresDatabase
      name: postgresdatabases.postgres.keiailab.io
      version: v1alpha1
    - description: PostgresUser declaratively manages PostgreSQL roles within a PostgresCluster. Applies role flags, membership, connectionLimit, passwordSecretRef, and validUntil via psql on the ready primary Pod. Aggregates results in status.managedRolesStatus. CNPG managed.roles compatible API surface.
      displayName: Postgres User
      kind: PostgresUser
      name: postgresusers.postgres.keiailab.io
      version: v1alpha1
    - description: ScheduledBackup creates atomic BackupJobs for a PostgresCluster on a 6-field cron schedule. Controls concurrent execution policy via concurrencyPolicy and owner reference behavior via backupOwnerReference.
      displayName: Scheduled Backup
      kind: ScheduledBackup
      name: scheduledbackups.postgres.keiailab.io
      version: v1alpha1
  description: |
    # Postgres Operator

    Apache-2.0 licensed Kubernetes operator for PostgreSQL — manages the
    `PostgresCluster` CRD with shard-aware topology (primary + standby
    streaming replication), automated failover (RTO < 30s verified),
    pgBackRest integration, and PG17/PG18 compatibility.

    ## Features

    - **PostgresCluster CRD** — declarative shard-aware topology (primary +
      standby streaming replication, hot-standby read scaling).
    - **Automated failover** — primary Pod delete smoke verified RTO < 30s.
    - **PG17 + PG18 multi-major support** — runtime image build/load via
      `hack/smoke.sh`, kind cluster smoke includes psql round-trip +
      streaming replication assertion.
    - **pgBackRest integration** — BackupJob CRD reconciles backup/restore
      Jobs and ScheduledBackup creates cron-driven BackupJobs.
    - **PgBouncer Pooler** — Pooler CRD reconciles ConfigMap, Deployment,
      Service, and fail-closed userlist Secret validation.
    - **Supply chain** — Cosign signed container images + SBOM (SPDX-2.3).
    - **Security baseline** — Pod Security Standards Restricted, RBAC
      least-privilege, NetworkPolicy isolation, non-root runAsUser.

    ## Documentation

    - GitHub: https://github.com/keiailab/postgres-operator
    - Helm Repository: https://keiailab.github.io/postgres-operator
    - Discussions: https://github.com/keiailab/postgres-operator/discussions

    ## Prerequisites

    - Kubernetes 1.26+
    - Storage class for PVCs (recommended: ceph-rbd or comparable RWO)
    - (Optional) cert-manager for automatic TLS certificate management
    - (Optional) Prometheus Operator for `ServiceMonitor` scraping
