    controller-gen.kubebuilder.io/version: v0.20.1
  name: postgresusers.postgres.keiailab.io
spec:
  group: postgres.keiailab.io
  names:
    categories:
    - postgres
    - role
    - all
    kind: PostgresUser
    listKind: PostgresUserList
    plural: postgresusers
    shortNames:
    - pguser
    singular: postgresuser
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.cluster.name
      name: Cluster
      type: string
    - jsonPath: .spec.name
      name: Role
      type: string
    - jsonPath: .spec.login
      name: Login
      type: boolean
    - jsonPath: .status.applied
      name: Applied
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PostgresUserSpec exposes the core operational surface of
              CNPG's managed.roles as a separate CRD.
            properties:
              bypassrls:
                description: BypassRLS controls whether the role can bypass row-level
                  security.
                type: boolean
              cluster:
                description: Cluster is the PostgresCluster in which the role is created.
                properties:
                  name:
                    description: Name is the PostgresCluster.metadata.name.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              connectionLimit:
                description: ConnectionLimit is the role's connection limit. nil leaves
                  it unchanged; -1 means unlimited.
                format: int32
                minimum: -1
                type: integer
              createdb:
                description: CreateDB controls whether the role has the CREATEDB attribute.
                type: boolean
              createrole:
                description: CreateRole controls whether the role has the CREATEROLE
                  attribute.
                type: boolean
              disablePassword:
                description: DisablePassword sets the role password to NULL, disabling
                  password login.
                type: boolean
              ensure:
                default: present
                description: Ensure is the desired role existence state. Empty defaults
                  to present.
                enum:
                - present
                - absent
                type: string
              inRoles:
                description: InRoles is the list of parent roles that this role becomes
                  a member of.
                items:
                  type: string
                type: array
              inherit:
                description: Inherit controls role privilege inheritance. nil reconciles
                  to PostgreSQL's default of true.
                type: boolean
              login:
                description: Login controls whether the role has the LOGIN attribute.
                type: boolean
              name:
                description: Name is the PostgreSQL role name.
                minLength: 1
                type: string
              passwordSecretRef:
                description: |-
                  PasswordSecretRef is the Secret whose data.username/data.password values are applied as
                  the PostgreSQL role password. data.username must match spec.name.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              replication:
                description: Replication controls whether the role has the REPLICATION
                  attribute.
                type: boolean
              superuser:
                description: Superuser controls whether the role has the SUPERUSER
                  attribute.
                type: boolean
              userReclaimPolicy:
                allOf:
                - enum:
                  - retain
                  - delete
                - enum:
                  - retain
                  - delete
                default: retain
                description: |-
                  UserReclaimPolicy controls how the PostgreSQL role is handled when the
                  CR is deleted. Empty defaults to "retain" (CR deletion is non-destructive
                  — the role keeps existing in PostgreSQL). When set to "delete" the
                  reconciler attaches a finalizer and runs `DROP ROLE` before allowing
                  the CR to be garbage-collected. Mirrors PostgresDatabase.spec.databaseReclaimPolicy.
                type: string
              validUntil:
                description: |-
                  ValidUntil is the expiry timestamp of the role password. Use any value PostgreSQL accepts
                  as a timestamp, or "infinity".
                type: string
            required:
