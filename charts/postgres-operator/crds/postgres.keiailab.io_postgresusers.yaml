              rule: self.name != 'postgres' && !self.name.startsWith('pg_')
            - message: passwordSecretRef and disablePassword cannot both be set
              rule: '!(has(self.passwordSecretRef) && has(self.disablePassword) &&
                self.disablePassword)'
          status:
