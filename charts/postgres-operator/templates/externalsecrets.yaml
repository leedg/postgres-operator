{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.postgresUser.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ required "externalSecrets.postgresUser.name is required" .Values.externalSecrets.postgresUser.name | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-operator.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.secretStoreKind | quote }}
    name: {{ required "externalSecrets.secretStoreName is required" .Values.externalSecrets.secretStoreName | quote }}
  target:
    name: {{ required "externalSecrets.postgresUser.targetName is required" .Values.externalSecrets.postgresUser.targetName | quote }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.externalSecrets.postgresUser.usernameKey | quote }}
      remoteRef:
        key: {{ required "externalSecrets.postgresUser.usernameRemoteKey is required" .Values.externalSecrets.postgresUser.usernameRemoteKey | quote }}
    - secretKey: {{ .Values.externalSecrets.postgresUser.passwordKey | quote }}
      remoteRef:
        key: {{ required "externalSecrets.postgresUser.passwordRemoteKey is required" .Values.externalSecrets.postgresUser.passwordRemoteKey | quote }}
{{- end }}
