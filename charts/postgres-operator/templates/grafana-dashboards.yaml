            "textMode": "auto"
          },
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "expr": "max(cnpg_pgbouncer_last_collection_error{namespace=~\"$namespace\",pod=~\"$pod\"})",
              "legendFormat": "last collection error",
              "refId": "A"
            }
          ],
          "title": "Exporter collection error",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "id": 2,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum by (namespace, pod, database, user) (cnpg_pgbouncer_pools_cl_waiting{namespace=~\"$namespace\",pod=~\"$pod\"})",
              "legendFormat": "{{ "{{" }}pod{{ "}}" }} {{ "{{" }}database{{ "}}" }}/{{ "{{" }}user{{ "}}" }}",
              "refId": "A"
            }
          ],
          "title": "Waiting clients",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "id": 3,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "max by (namespace, pod, database, user) (cnpg_pgbouncer_pools_maxwait{namespace=~\"$namespace\",pod=~\"$pod\"})",
              "legendFormat": "{{ "{{" }}pod{{ "}}" }} {{ "{{" }}database{{ "}}" }}/{{ "{{" }}user{{ "}}" }}",
              "refId": "A"
            }
          ],
          "title": "Client max wait",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 13
          },
          "id": 4,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum by (namespace, pod, database, user) (cnpg_pgbouncer_pools_cl_active{namespace=~\"$namespace\",pod=~\"$pod\"})",
              "legendFormat": "client {{ "{{" }}pod{{ "}}" }} {{ "{{" }}database{{ "}}" }}/{{ "{{" }}user{{ "}}" }}",
              "refId": "A"
            },
            {
              "expr": "sum by (namespace, pod, database, user) (cnpg_pgbouncer_pools_sv_active{namespace=~\"$namespace\",pod=~\"$pod\"})",
              "legendFormat": "server {{ "{{" }}pod{{ "}}" }} {{ "{{" }}database{{ "}}" }}/{{ "{{" }}user{{ "}}" }}",
              "refId": "B"
            }
          ],
          "title": "Active client/server connections",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 13
          },
          "id": 5,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "cnpg_pgbouncer_lists_used_clients{namespace=~\"$namespace\",pod=~\"$pod\"}",
              "legendFormat": "used clients {{ "{{" }}pod{{ "}}" }}",
              "refId": "A"
            },
            {
              "expr": "cnpg_pgbouncer_lists_free_clients{namespace=~\"$namespace\",pod=~\"$pod\"}",
              "legendFormat": "free clients {{ "{{" }}pod{{ "}}" }}",
              "refId": "B"
            }
          ],
          "title": "Client slots",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "postgres-operator",
        "pgbouncer"
      ],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
