{{- if .Values.rbac.create -}}
# 본 ClusterRole은 cmd/main.go의 +kubebuilder:rbac 마커와 정합한다.
# config/rbac/role.yaml의 결과를 chart에 통합. controller-gen 결과 변경 시
# 본 파일도 동기화 필요 (Makefile chart-rbac-sync 타겟 — 후속).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "postgres-operator.fullname" . }}-manager-role
  labels:
    {{- include "postgres-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [postgres.keiailab.io]
    resources: [backupjobs, poolers, postgresclusters, postgresdatabases, postgresusers, scheduledbackups]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [postgres.keiailab.io]
    resources: [imagecatalogs, clusterimagecatalogs]
    verbs: [get, list, watch]
  - apiGroups: [postgres.keiailab.io]
    resources: [backupjobs/status, poolers/status, postgresclusters/status, postgresdatabases/status, postgresusers/status, scheduledbackups/status]
    verbs: [get, update, patch]
  - apiGroups: [postgres.keiailab.io]
    resources: [backupjobs/finalizers, poolers/finalizers, postgresclusters/finalizers, postgresdatabases/finalizers, postgresusers/finalizers, scheduledbackups/finalizers]
    verbs: [update]
  - apiGroups: [apps]
    resources: [statefulsets, deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [services, configmaps, secrets, serviceaccounts]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, patch, update]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, patch]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [events.k8s.io]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [roles, rolebindings]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses]
    verbs: [get, list, watch]
  # Pillar P7 §7 Phase 2 — cert-manager Certificate CR upsert (TLS 통합).
  - apiGroups: [cert-manager.io]
    resources: [certificates]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "postgres-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "postgres-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "postgres-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "postgres-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
