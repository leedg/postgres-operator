# Default values for postgres-operator chart (P1-4, ADR 0007).
#
# 본 chart는 *operator 자체*만 배포한다. PostgresCluster CR 인스턴스는 별도로
# 배포 (helm 외부의 kubectl apply, 또는 후속 charts/postgrescluster).
#
# 변경 절차:
# 1. 본 파일에서 default 값 변경
# 2. helm install --values custom-values.yaml ...로 override 가능

# ============================================================================
# Operator container image
# ============================================================================
image:
  # 운영 시 사용자 registry로 override 권장.
  repository: ghcr.io/keiailab/postgres-operator
  # 비워두면 Chart.yaml의 appVersion이 자동 적용됨 (templates/_helpers.tpl).
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ============================================================================
# Deployment topology
# ============================================================================
# Operator manager Pod replica 수. HA를 위해 2+ 권장 (leader election 자동).
# alpha 단계는 1로 시작 (단일 인스턴스도 reconcile 정합성 보장).
replicas: 1

# Pod-level SecurityContext (operator manager 자체).
# config/manager/manager.yaml과 일치. 변경 시 kustomize 결과와 정합 유지 필요.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container-level SecurityContext.
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

# Resource requests/limits. alpha 기본값은 *작음*. production은 측정 후 조정.
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Pod scheduling
nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""

# -- Topology spread constraints for operator pod scheduling
topologySpreadConstraints: []

# -- Runtime class name for operator pod (e.g., gvisor, kata)
runtimeClassName: ""

# -- DNS policy (ClusterFirst, ClusterFirstWithHostNet, Default, None)
dnsPolicy: ""

# -- DNS config — used when dnsPolicy=None or supplemental
dnsConfig: {}

# -- Host aliases — additional /etc/hosts entries
hostAliases: []

# -- Termination grace period seconds (default 30 — k8s default)
terminationGracePeriodSeconds: null

# -- Additional pod annotations
podAnnotations: {}

# -- Additional pod labels
podLabels: {}

# -- Operator container additional env vars (raw EnvVar list)
extraEnvVars: []

# -- Operator container additional env vars from ConfigMaps (raw EnvFromSource list)
extraEnvVarsCM: []

# -- Operator container additional env vars from Secrets (raw EnvFromSource list)
extraEnvVarsSecret: []

# -- Additional volumes mounted into the operator pod (raw Volume list)
extraVolumes: []

# -- Additional volume mounts on the operator container (raw VolumeMount list)
extraVolumeMounts: []

# -- Additional init containers (raw Container list)
extraInitContainers: []

# -- Additional sidecar containers (raw Container list)
sidecars: []

# -- Custom liveness probe (overrides default if non-empty)
customLivenessProbe: {}

# -- Custom readiness probe (overrides default if non-empty)
customReadinessProbe: {}

# -- Custom startup probe
customStartupProbe: {}

# -- Container lifecycle hooks (postStart / preStop)
lifecycleHooks: {}

# ============================================================================
# Service Account + RBAC
# ============================================================================
serviceAccount:
  # false면 사용자가 직접 ServiceAccount를 생성·관리해야 함.
  create: true
  # 빈 문자열이면 chart가 fullname helper로 자동 생성.
  name: ""
  annotations: {}

rbac:
  # ClusterRole + ClusterRoleBinding을 chart가 생성할지 여부.
  # multi-tenant 환경에서 false로 두고 별도 RBAC 적용 가능.
  create: true

# ============================================================================
# NetworkPolicy (P0-3, ADR 0006 §NetworkPolicy)
# ============================================================================
networkPolicies:
  # 데이터플레인 default-deny + cluster-internal allow + router ingress allow
  enabled: true

# ============================================================================
# Metrics endpoint
# ============================================================================
metrics:
  # /metrics endpoint를 8443에서 expose. Prometheus가 scrape.
  enabled: true
  port: 8443
  service:
    enabled: true
    type: ClusterIP
    annotations: {}
    labels: {}
  # ServiceMonitor (prometheus-operator) 자동 생성. CRD 부재 시 install fail
  # 회피 위해 helm install --skip-tests 또는 별도 disable.
  serviceMonitor:
    enabled: false
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    tlsConfig:
      insecureSkipVerify: true
    annotations: {}
    labels: {}
  # PrometheusRule (prometheus-operator) 자동 생성. ServiceMonitor와 독립적으로
  # 렌더링 가능하지만 실제 scrape/alert에는 Prometheus Operator가 필요하다.
  prometheusRule:
    enabled: false
    groupName: postgres-operator.rules
    annotations: {}
    labels: {}
    windows:
      reconcileErrors: 5m
      reconcileLatency: 5m
    thresholds:
      reconcileP95Seconds: 10
      dataVolumeFreeRatio: 0.15
      replicationLagBytes: 16777216
      poolerClientWaiting: 0
      poolerClientMaxWaitSeconds: 30
    for:
      operatorDown: 5m
      reconcileErrors: 2m
      reconcileLatency: 10m
      backupFailure: 1m
      poolerFailure: 1m
      poolerExporterCollectionFailure: 2m
      poolerClientWaiting: 2m
      poolerClientMaxWait: 5m
      replicationLag: 5m
      dataVolumeLow: 15m
  # Grafana dashboard ConfigMap. kube-prometheus-stack sidecar 환경에서는
  # 기본 label(grafana_dashboard=1)로 자동 import 할 수 있다.
  grafanaDashboards:
    enabled: false
    labelName: grafana_dashboard
    labelValue: "1"
    annotations: {}
    labels: {}

# ============================================================================
# Logging
# ============================================================================
log:
  # zap encoder. "console"(개발용 가독성) | "json"(production 파싱)
  encoder: json
  level: info
