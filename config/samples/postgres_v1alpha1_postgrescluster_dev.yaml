# keiailab/postgres-operator — quickstart 샘플 (dev 모드, vanilla PG18, RFC 0001 v2)
#
# 0.3.0-alpha (RFC 0001) 이후 schema 는 shardCount/shardingMode 모델로 통합됨.
# coordinator/workers/routers 옛 schema 는 폐기 (commit f01894e).
#
# 적용:
#   kubectl apply -f config/samples/postgres_v1alpha1_postgrescluster_dev.yaml
#
# 기대 결과:
#   - PostgresCluster CR 이 생성됨 (shardingMode=none, single shard).
#   - reconciler 가 ConfigMap + StatefulSet (replicas=1) + headless Service 생성.
#   - status.shards[0].primary.ready = true (~1~2분 후 PG 부팅 완료).
#   - status.conditions[type=Ready].status = "True".
#
# dev 모드 의미: shards.replicas=0 → primary 1 개만 (HA 없음).
#   production 은 replicas≥1 (RFC 0001 §3 권장) + shardingMode=native 시 router 활성.
apiVersion: postgres.keiailab.io/v1alpha1
kind: PostgresCluster
metadata:
  name: quickstart
  # namespace 미지정 = kubectl 컨텍스트 / -n 플래그가 결정한다.
  # (e2e 는 `-n pg-e2e` 로 override; quickstart 문서는 현재 namespace 로 적용.)
  # 하드코딩된 `namespace: default` 는 `kubectl apply -n <other>` 와 충돌하므로 제거.
spec:
  postgresVersion: "18"
  shardingMode: none
  shards:
    initialCount: 1
    replicas: 0
    storage:
      size: 10Gi
      # storageClass 미지정 = 클러스터 default. kind/k3d 환경은 standard 등.
