apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: backupjobs.postgres.keiailab.io
spec:
  group: postgres.keiailab.io
  names:
    kind: BackupJob
    listKind: BackupJobList
    plural: backupjobs
    shortNames:
    - bj
    singular: backupjob
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.cluster.name
      name: Cluster
      type: string
    - jsonPath: .spec.tool
      name: Tool
      type: string
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BackupJob은 단일 백업 실행 명령이다 (RFC 0004).

          본 CRD는 *atomic 단위*다 — 변경 시 새 BackupJob 생성. cron 기반 정기 백업은
          별도 ScheduledBackup CRD (RFC 0004 §2.3, P4-T2 시점).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BackupJobSpec은 단일 백업 호출의 명세다 (RFC 0004 §2.1).

              immutable 필드 (생성 후 변경 불가, webhook이 reject 예정 — phase 2):
                - cluster.name
                - tool
                - type
                - executionMode
            properties:
              cluster:
                description: Cluster는 백업 대상 PostgresCluster 참조 (같은 namespace).
                properties:
                  name:
                    description: Name은 PostgresCluster.metadata.name.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              executionMode:
                description: |-
                  ExecutionMode는 plugin이 백업을 *어디서 실행*할지 결정 (P1-6, RFC 0004 §3.1):
                    - "sidecar": PG Pod 동거 컨테이너 (pgBackRest 패턴)
                    - "job":     standalone K8s Job (WAL-G 패턴)
                    - "":        plugin default
                enum:
                - sidecar
                - job
                - ""
                type: string
              labels:
                additionalProperties:
                  type: string
                description: Labels는 BackupResult 메타데이터에 첨부될 K8s 스타일 레이블.
                type: object
              repo:
                description: Repo는 다중 저장소 환경에서 어느 repo를 쓸지 식별.
                minLength: 1
                type: string
              restore:
                description: Restore는 Type=restore 시 PITR 설정 (RFC 0004 §5.1).
                properties:
                  backupID:
                    description: BackupID는 복구 대상 백업 식별자 (TargetTime 대신 직접 지정).
                    type: string
                  targetTime:
                    description: TargetTime은 복구 대상 시각 (UTC, ISO 8601 RFC3339).
                    format: date-time
                    type: string
                type: object
              retention:
                description: Retention은 백업 보존 정책.
                properties:
                  keepFull:
                    description: KeepFull은 보존할 full 백업 개수. 0이면 무제한 (plugin 기본).
                    format: int32
                    minimum: 0
                    type: integer
                  keepIncremental:
                    description: KeepIncremental은 보존할 incremental/differential 백업
                      개수.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              tool:
                description: |-
                  Tool은 사용할 백업 도구 이름. BackupPlugin.Name()과 일치해야 한다.
                  예: "pgbackrest" (RFC 0004 §4 1차 reference), "walg", "barman".
                minLength: 1
                type: string
              type:
                description: Type은 백업 종류.
                enum:
                - full
                - incremental
                - differential
                - restore
                type: string
            required:
            - cluster
            - repo
            - tool
            - type
            type: object
          status:
            description: BackupJobStatus는 BackupJob의 관찰 상태.
            properties:
              backupID:
                description: BackupID는 plugin이 부여한 고유 식별자 (Succeeded 후).
                type: string
              bytes:
                description: Bytes는 백업 크기 (bytes). 0 허용 (스트리밍 도구).
                format: int64
                type: integer
              conditions:
                description: Conditions는 K8s 표준 상태 (Ready, Available, Progressing).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endedAt:
                description: EndedAt은 백업 종료 시각.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration은 reconcile이 마지막 처리한 spec generation.
                format: int64
                type: integer
              phase:
                description: Phase는 BackupJob 진행 단계.
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                type: string
              startedAt:
                description: StartedAt은 백업 시작 시각.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: postgresclusters.postgres.keiailab.io
spec:
  group: postgres.keiailab.io
  names:
    kind: PostgresCluster
    listKind: PostgresClusterList
    plural: postgresclusters
    shortNames:
    - pgc
    singular: postgrescluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.shards.initialCount
      name: Shards
      type: integer
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .spec.postgresVersion
      name: Version
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PostgresCluster 는 K8s-native 자체 분산 PostgreSQL 클러스터의 선언적 표현이다
          (ADR 0001).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              PostgresClusterSpec 는 PostgresCluster CR 의 desired state 다 (RFC 0001 §3).

              CEL 검증 (kubebuilder v0.15+):
            properties:
              autoSplit:
                description: AutoSplit 은 자동 샤드 분할 정책.
                properties:
                  enabled:
                    default: false
                    description: Enabled 는 자동 분할 활성화 여부. P2+ 에서 의미를 갖는다.
                    type: boolean
                  requireApproval:
                    default: true
                    description: |-
                      RequireApproval 은 자동 분할 대상 후보를 ShardSplitJob 으로 제출하되 수동
                      승인 annotation 후에만 실행하도록 강제한다 (production safety).
                    type: boolean
                  triggers:
                    description: Triggers 는 분할 임계치 집합.
                    properties:
                      cpuPercent:
                        description: CPUPercent 는 단일 샤드 평균 CPU 사용률 임계치 (%). 0 이면 미사용.
                        format: int32
                        maximum: 100
                        minimum: 0
                        type: integer
                      durationMinutes:
                        description: DurationMinutes 는 위 임계치들이 지속되어야 하는 시간 (분). 0
                          이면 즉시.
                        format: int32
                        minimum: 0
                        type: integer
                      p99LatencyMs:
                        description: P99LatencyMs 는 단일 샤드 P99 latency 임계치 (ms). 0
                          이면 미사용.
                        format: int32
                        minimum: 0
                        type: integer
                      sizeThresholdGB:
                        description: SizeThresholdGB 는 단일 샤드 크기 임계치 (GB). 0 이면 미사용.
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                type: object
              backup:
                description: Backup 은 백업/PITR 정책.
                properties:
                  enabled:
                    default: false
                    description: Enabled 는 백업 정책 활성화 여부 (사용자 명시 opt-in).
                    type: boolean
                  repo:
                    description: Repo 는 백업 저장소 설정.
                    properties:
                      bucket:
                        description: Bucket 은 object storage 버킷 이름.
                        type: string
                      endpoint:
                        description: Endpoint 는 S3 호환 endpoint URL (선택).
                        type: string
                      path:
                        description: Path 는 filesystem 경로 (Type=filesystem).
                        type: string
                      region:
                        description: Region 은 object storage 리전.
                        type: string
                      type:
                        description: Type 은 저장소 종류 (s3 | gcs | azure | filesystem).
                        enum:
                        - s3
                        - gcs
                        - azure
                        - filesystem
                        type: string
                    type: object
                  retention:
                    description: Retention 은 백업 보존 정책.
                    properties:
                      full:
                        description: 'Full 은 full 백업 보존 기간 (duration: "7d", "168h"
                          등).'
                        type: string
                      incremental:
                        description: Incremental 은 incremental 백업 보존 기간.
                        type: string
                      walArchive:
                        description: WALArchive 는 WAL 아카이브 보존 기간.
                        type: string
                    type: object
                  schedule:
                    description: 'Schedule 은 cron expression (예: "0 2 * * *").'
                    type: string
                type: object
              extensions:
                description: |-
                  Extensions 는 활성화할 PostgreSQL extension 의 이름 목록이다 (RFC 0006 R1).
                  비어 있으면 vanilla PG (image base 외 추가 extension 없음). 각 이름은 operator
                  부트스트랩 시 Registry 에 등록된 ExtensionPlugin 이어야 하며, webhook 이 이를
                  검증한다.

                  예: ["pgaudit", "pgvector"] — postgres_v1alpha1 image 가 두 extension 의 .so 를
                  보유한다는 전제. image 가 미보유 시 postgres FATAL — 사용자 책임.
                items:
                  type: string
                type: array
              monitoring:
                description: Monitoring 은 monitoring 통합 설정.
                properties:
                  prometheusRule:
                    description: PrometheusRule 은 알람 규칙 자동 배포.
                    properties:
                      enabled:
                        default: true
                        description: Enabled 는 PrometheusRule 생성 여부.
                        type: boolean
                    type: object
                  serviceMonitor:
                    description: ServiceMonitor 는 Prometheus operator ServiceMonitor
                      자동 배포.
                    properties:
                      enabled:
                        default: true
                        description: Enabled 는 ServiceMonitor 생성 여부.
                        type: boolean
                      interval:
                        default: 30s
                        description: 'Interval 은 scrape interval (예: "30s").'
                        type: string
                    type: object
                type: object
              postgresVersion:
                default: "18"
                description: PostgresVersion 은 메이저 버전 문자열. 0.3.0-alpha 는 18 만 GA,
                  17 호환 유지.
                enum:
                - "17"
                - "18"
                type: string
              router:
                description: Router 는 무상태 QueryRouter 풀. shardingMode=native 시에만 의미.
                properties:
                  autoscale:
                    description: Autoscale 은 HPA 설정.
                    properties:
                      enabled:
                        default: false
                        description: Enabled 는 HPA 부착 여부.
                        type: boolean
                      maxReplicas:
                        description: MaxReplicas 는 HPA 최대 복제본.
                        format: int32
                        minimum: 1
                        type: integer
                      minReplicas:
                        description: MinReplicas 는 HPA 최소 복제본.
                        format: int32
                        minimum: 1
                        type: integer
                      targetActiveConnections:
                        default: 1000
                        description: TargetActiveConnections 는 HPA active connection
                          목표.
                        format: int32
                        minimum: 1
                        type: integer
                      targetCPU:
                        default: 70
                        description: TargetCPU 는 HPA CPU 사용률 목표 (%).
                        format: int32
                        maximum: 100
                        minimum: 1
                        type: integer
                    type: object
                  enabled:
                    default: true
                    description: Enabled 는 라우터 활성화 여부. shardingMode=native 시 default
                      true.
                    type: boolean
                  replicas:
                    default: 2
                    description: Replicas 는 라우터 Pod 수. HPA 부착 시 minimum 역할.
                    format: int32
                    minimum: 1
                    type: integer
                  resources:
                    description: Resources 는 라우터 컨테이너 리소스 요구사항.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                type: object
              shardingMode:
                default: none
                description: ShardingMode 는 단일 샤드 (none) 또는 자체 분산 SQL (native).
                enum:
                - none
                - native
                type: string
              shards:
                description: Shards 는 샤드 토폴로지.
                properties:
                  affinity:
                    description: Affinity 는 샤드 Pod 친화성 규칙.
                    properties:
                      nodeAffinity:
                        description: Describes node affinity scheduling rules for
                          the pod.
                        properties:
                          preferredDuringSchedulingIgnoredDuringExecution:
                            description: |-
                              The scheduler will prefer to schedule pods to nodes that satisfy
                              the affinity expressions specified by this field, but it may choose
                              a node that violates one or more of the expressions. The node that is
                              most preferred is the one with the greatest sum of weights, i.e.
                              for each node that meets all of the scheduling requirements (resource
                              request, requiredDuringScheduling affinity expressions, etc.),
                              compute a sum by iterating through the elements of this field and adding
                              "weight" to the sum if the node matches the corresponding matchExpressions; the
                              node(s) with the highest sum are the most preferred.
                            items:
                              description: |-
                                An empty preferred scheduling term matches all objects with implicit weight 0
                                (i.e. it's a no-op). A null preferred scheduling term matches no objects (i.e. is also a no-op).
                              properties:
                                preference:
                                  description: A node selector term, associated with
                                    the corresponding weight.
                                  properties:
                                    matchExpressions:
                                      description: A list of node selector requirements
                                        by node's labels.
                                      items:
                                        description: |-
                                          A node selector requirement is a selector that contains values, a key, and an operator
                                          that relates the key and values.
                                        properties:
                                          key:
                                            description: The label key that the selector
                                              applies to.
                                            type: string
                                          operator:
                                            description: |-
                                              Represents a key's relationship to a set of values.
                                              Valid operators are In, NotIn, Exists, DoesNotExist. Gt, and Lt.
                                            type: string
                                          values:
                                            description: |-
                                              An array of string values. If the operator is In or NotIn,
                                              the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                              the values array must be empty. If the operator is Gt or Lt, the values
                                              array must have a single element, which will be interpreted as an integer.
                                              This array is replaced during a strategic merge patch.
                                            items:
                                              type: string
                                            type: array
                                            x-kubernetes-list-type: atomic
                                        required:
                                        - key
                                        - operator
                                        type: object
                                      type: array
                                      x-kubernetes-list-type: atomic
                                    matchFields:
                                      description: A list of node selector requirements
                                        by node's fields.
                                      items:
                                        description: |-
                                          A node selector requirement is a selector that contains values, a key, and an operator
                                          that relates the key and values.
                                        properties:
                                          key:
                                            description: The label key that the selector
                                              applies to.
                                            type: string
                                          operator:
                                            description: |-
                                              Represents a key's relationship to a set of values.
                                              Valid operators are In, NotIn, Exists, DoesNotExist. Gt, and Lt.
                                            type: string
                                          values:
                                            description: |-
                                              An array of string values. If the operator is In or NotIn,
                                              the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                              the values array must be empty. If the operator is Gt or Lt, the values
                                              array must have a single element, which will be interpreted as an integer.
                                              This array is replaced during a strategic merge patch.
                                            items:
                                              type: string
                                            type: array
                                            x-kubernetes-list-type: atomic
                                        required:
                                        - key
                                        - operator
                                        type: object
                                      type: array
                                      x-kubernetes-list-type: atomic
                                  type: object
                                  x-kubernetes-map-type: atomic
                                weight:
                                  description: Weight associated with matching the
                                    corresponding nodeSelectorTerm, in the range 1-100.
                                  format: int32
                                  type: integer
                              required:
                              - preference
                              - weight
                              type: object
                            type: array
                            x-kubernetes-list-type: atomic
                          requiredDuringSchedulingIgnoredDuringExecution:
                            description: |-
                              If the affinity requirements specified by this field are not met at
                              scheduling time, the pod will not be scheduled onto the node.
                              If the affinity requirements specified by this field cease to be met
                              at some point during pod execution (e.g. due to an update), the system
                              may or may not try to eventually evict the pod from its node.
                            properties:
                              nodeSelectorTerms:
                                description: Required. A list of node selector terms.
                                  The terms are ORed.
                                items:
                                  description: |-
                                    A null or empty node selector term matches no objects. The requirements of
                                    them are ANDed.
                                    The TopologySelectorTerm type implements a subset of the NodeSelectorTerm.
                                  properties:
                                    matchExpressions:
                                      description: A list of node selector requirements
                                        by node's labels.
                                      items:
