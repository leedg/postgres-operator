                          automatically deleted. When the Job is being deleted, its lifecycle
                          guarantees (e.g. finalizers) will be honored. If this field is unset,
                          the Job won't be automatically deleted. If this field is set to zero,
                          the Job becomes eligible to be deleted immediately after it finishes.
                        format: int32
                        type: integer
                    required:
                    - template
                    type: object
                type: object
              labels:
                additionalProperties:
                  type: string
                description: Labels are copied to spec.labels of each created BackupJob.
                type: object
              repo:
                description: Repo identifies which repository to use in multi-repo
                  deployments.
                minLength: 1
                type: string
              retention:
                description: Retention is the retention policy copied to each created
                  BackupJob.
                properties:
                  keepFull:
                    description: KeepFull is the number of full backups to retain.
                      0 means unlimited (plugin default).
                    format: int32
                    minimum: 0
                    type: integer
                  keepIncremental:
                    description: KeepIncremental is the number of incremental/differential
                      backups to retain.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              schedule:
                description: |-
                  Schedule is a 6-field cron expression that includes a seconds field.
                  Format: "second minute hour day-of-month month day-of-week".
                  Example: "0 0 2 * * *" — every day at 02:00:00.
                minLength: 1
                type: string
              suspend:
                default: false
                description: Suspend=true stops the creation of new BackupJobs. Existing
                  BackupJobs are left alone.
                type: boolean
              tool:
                description: Tool is the name of the backup tool to use; must match
                  BackupPlugin.Name().
                minLength: 1
                type: string
              type:
                default: full
                description: Type is the scheduled backup kind. The restore kind is
                  only allowed on an atomic BackupJob.
                enum:
                - full
                - incremental
                - differential
                type: string
            required:
            - cluster
            - repo
            - schedule
            - tool
            type: object
          status:
            description: ScheduledBackupStatus is the observed state of the scheduled-backup
              controller.
            properties:
              conditions:
                description: Conditions is the standard Kubernetes condition set.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastBackupJobName:
                description: LastBackupJobName is the name of the most recently created
                  BackupJob.
                type: string
              lastScheduleTime:
                description: LastScheduleTime is the schedule time at which BackupJob
                  creation was last attempted.
                format: date-time
                type: string
              nextScheduleTime:
                description: NextScheduleTime is the next scheduled creation time.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation last processed
                  by the reconciler.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
